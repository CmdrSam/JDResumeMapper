services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8501:8501"
    depends_on:
      - redis
    volumes:
      - outputs_data:/app/outputs

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["uvicorn", "api_app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - outputs_data:/app/outputs

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["rq", "worker", "--url", "${REDIS_URL:-redis://redis:6379/0}", "match_jobs"]
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    volumes:
      - outputs_data:/app/outputs

volumes:
  outputs_data:
  redis_data:

